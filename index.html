<!--
  ============================================================================
  ASTRUS SUBMISSION SUMMARY — CONCEPT COMPARISON  (3-up, side-by-side)
  ----------------------------------------------------------------------------
  Single page. Three summary concepts render LIVE and INLINE, in equal-weight
  columns, so an underwriter can compare them at a glance:

    Concept 1 · #2093  Bold Boxes    (ported from concepts/02-bold-boxes.html)
    Concept 2 · #7641  Lead Status   (ported from concepts/03-lead-status.html)
    Concept 3 · #5150  Tracked Ledger (NEW hybrid — most scannable of the three)

  ONE shared submission toggle (A & B Painting | J.H. Lynch) re-renders all
  three panels at once. The DATA object + status-icon SVGs are copied verbatim
  from the source concepts — identical values across all three panels.

  Namespacing: every concept's classes are prefixed c1- / c2- / c3- so the three
  layouts share no generic class names and cannot collide on one page.

  LWС-safe: inline style + script + SVG only, system fonts, light mode, no CDN /
  remote anything. Status vocabulary: Present / Missing / Partial (OK for ok).
  ============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Astrus Submission Summary — Concept Comparison</title>
<style>
  :root {
    --brand:#0176d3; --brand-dark:#032d60;
    --ink:#141414; --text-2:#3a3a38; --muted:#5c5a58;
    --border:#d5dae3; --surface:#ffffff; --recess:#f2f5f9; --canvas:#e9edf3;
    --ok:#137333;   --ok-bg:#d6f4de;   --ok-bd:#2f9d4c;
    --warn:#a8500a; --warn-bg:#ffe4b8; --warn-bd:#e89a34;
    --miss:#be1b1b; --miss-bg:#fbd2d0; --miss-bd:#e4514d;
    --geo:#0b3d78;  --geo-bg:#dcecfb;  --geo-bd:#9cc8f0;
    --shadow-card:0 4px 16px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.10);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body { margin:0; font-family:var(--font); color:var(--ink); background:var(--canvas);
         line-height:1.4; -webkit-font-smoothing:antialiased; font-size:16px;
         font-variant-numeric:tabular-nums; overflow-x:hidden; }

  /* ---- breadcrumb + hero -------------------------------------------------- */
  .breadcrumb { background:var(--brand-dark); color:#fff; font-size:0.8125rem; font-weight:600;
                padding:0.5rem 1.5rem; display:flex; align-items:center; gap:.5rem; }
  .breadcrumb .sep { opacity:.55; } .breadcrumb .home { opacity:.85; }

  header.hero { background:linear-gradient(135deg,var(--brand-dark) 0%,#0b3d78 55%,var(--brand) 150%);
                color:#fff; padding:2.75rem 1.5rem 2.5rem; position:relative; overflow:hidden; }
  header.hero::after { content:""; position:absolute; right:-80px; top:-90px; width:340px; height:340px;
                       background:radial-gradient(circle,rgba(255,255,255,.10),transparent 70%); pointer-events:none; }
  .hero-inner { max-width:1560px; margin:0 auto; position:relative; z-index:1; }
  header.hero h1 { margin:0; font-size:clamp(1.8rem,3.4vw,2.75rem); font-weight:700;
                   line-height:1.05; letter-spacing:-0.025em; }
  header.hero p.lede { margin:.7rem 0 0; max-width:60ch; font-size:0.9375rem; font-weight:500;
                       color:rgba(255,255,255,.86); line-height:1.5; }

  /* ---- control bar: shared toggle + legend -------------------------------- */
  .controls { max-width:1560px; margin:0 auto; padding:1.4rem 1.5rem 0;
              display:flex; flex-wrap:wrap; align-items:center; gap:1rem 1.5rem; }
  .ctl-label { font-size:0.6875rem; font-weight:800; letter-spacing:0.08em; text-transform:uppercase;
               color:var(--muted); margin-right:-.5rem; }
  .toggle { display:inline-flex; gap:0; background:var(--surface); border:1px solid var(--border);
            border-radius:9px; padding:3px; box-shadow:0 1px 2px rgba(0,0,0,0.05); }
  .toggle button { font-family:inherit; font-size:0.8125rem; font-weight:800; letter-spacing:-0.01em;
                   color:var(--muted); background:transparent; border:0; border-radius:6px;
                   padding:8px 16px; cursor:pointer; transition:color .12s ease, background .12s ease; }
  .toggle button:hover { color:var(--text-2); }
  .toggle button[aria-pressed="true"] { color:#fff; background:var(--brand); }
  .toggle button:focus-visible { outline:2px solid var(--brand-dark); outline-offset:2px; }

  .legend { display:flex; flex-wrap:wrap; align-items:center; gap:8px 16px; }
  .lg { display:inline-flex; align-items:center; gap:6px; font-size:0.75rem; font-weight:700; color:var(--text-2); }
  .lg svg { width:16px; height:16px; flex:none; }

  /* ---- comparison grid ---------------------------------------------------- */
  .compare { max-width:1560px; margin:0 auto; padding:1.4rem 1.5rem 3.5rem;
             display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:1.25rem; align-items:start; }
  @media (max-width:1199px) { .compare { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  @media (max-width:799px)  { .compare { grid-template-columns:1fr; } }

  .panel { min-width:0; background:var(--surface); border:1px solid var(--border); border-radius:12px;
           box-shadow:var(--shadow-card); overflow:hidden; display:flex; flex-direction:column; }

  /* column header bar (equal weight across all three) */
  .panel-head { background:linear-gradient(135deg,var(--brand-dark),#0b3d78); color:#fff;
                padding:14px 18px; display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .panel-head .pn { font-size:1.375rem; font-weight:800; letter-spacing:-0.02em; line-height:1; }
  .panel-head .pmeta { font-family:var(--mono); font-size:0.75rem; font-weight:600;
                       color:rgba(255,255,255,.78); letter-spacing:.01em; }
  .panel-head .pmeta b { color:#fff; font-weight:700; }

  .panel-body { flex:1; }

  /* shared applicant header inside each panel */
  .p-head { padding:14px 16px 12px; border-bottom:2px solid var(--border); }
  .p-eyebrow { display:flex; align-items:center; flex-wrap:wrap; gap:6px; font-size:0.6875rem;
               font-weight:800; letter-spacing:0.03em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .p-eyebrow:empty { display:none; }
  .p-eyebrow .sub { color:var(--brand-dark); }
  .p-eyebrow .pill { text-transform:none; letter-spacing:0; font-weight:700; color:var(--text-2);
                     background:var(--recess); border:1px solid var(--border); border-radius:100px;
                     padding:2px 9px; font-size:0.625rem; }
  .p-eyebrow .d { width:3px; height:3px; border-radius:50%; background:#b9bdc7; }
  .p-applicant { font-size:1.125rem; line-height:1.15; font-weight:800; letter-spacing:-0.02em; margin:0; }
  .p-subline { margin-top:5px; font-size:0.75rem; font-weight:600; color:var(--text-2); line-height:1.45; }

  /* shared LOB name / geo tag styling (used by all three, prefix-free but only inside .p-head siblings) */
  .geotag { font-size:0.5625rem; font-weight:800; letter-spacing:0.03em; color:var(--geo);
            background:var(--geo-bg); border:1px solid var(--geo-bd); border-radius:4px; padding:1px 6px; }
  .kindtag { font-size:0.5625rem; font-weight:700; color:var(--muted); background:var(--recess);
             border:1px solid var(--border); border-radius:4px; padding:1px 6px; }

  /* ======================================================================== */
  /* CONCEPT 1 — BOLD BOXES  (prefix c1-)                                      */
  /* ======================================================================== */
  .c1-rows { padding:4px 0 6px; }
  .c1-row { display:grid; grid-template-columns:1fr; gap:8px; padding:9px 16px; }
  .c1-row + .c1-row { border-top:1px solid var(--border); }
  .c1-row.c1-identity { background:linear-gradient(90deg,#eaf3fc 0%, #fff 70%); }
  .c1-row.c1-identity .c1-row-name { color:var(--brand-dark); }
  .c1-row-id { display:flex; align-items:baseline; flex-wrap:wrap; gap:8px; }
  .c1-row-name { font-size:0.875rem; font-weight:800; letter-spacing:-0.01em; }
  .c1-fields { display:flex; flex-wrap:wrap; gap:6px; }
  .c1-fc { display:inline-flex; align-items:center; gap:6px; border:2px solid; border-radius:8px; padding:4px 9px 4px 7px; }
  .c1-fc svg { width:16px; height:16px; flex:none; }
  .c1-txt { display:flex; flex-direction:column; line-height:1.1; }
  .c1-lab { font-size:0.5625rem; font-weight:800; letter-spacing:0.05em; text-transform:uppercase; }
  .c1-val { font-size:0.875rem; font-weight:800; letter-spacing:-0.01em; color:var(--ink); }
  .c1-val .c1-cur { font-size:0.75rem; }
  .c1-fc.c1-ok   { background:var(--ok-bg);   border-color:var(--ok-bd); }
  .c1-fc.c1-ok   .c1-lab { color:var(--ok); }
  .c1-fc.c1-warn { background:var(--warn-bg); border-color:var(--warn-bd); }
  .c1-fc.c1-warn .c1-lab { color:var(--warn); } .c1-fc.c1-warn .c1-val { color:var(--warn); font-size:0.75rem; }
  .c1-fc.c1-miss { background:var(--miss-bg); border-color:var(--miss-bd); }
  .c1-fc.c1-miss .c1-lab { color:var(--miss); } .c1-fc.c1-miss .c1-val { color:var(--miss); font-size:0.75rem; }

  /* ======================================================================== */
  /* CONCEPT 2 — LEAD STATUS  (prefix c2-)                                     */
  /* ======================================================================== */
  .c2-rows { padding:4px 12px 10px; }
  .c2-row { padding:11px 6px; }
  .c2-row + .c2-row { border-top:1px solid var(--border); }
  .c2-row-head { display:flex; align-items:baseline; flex-wrap:wrap; gap:8px; margin-bottom:7px; }
  .c2-row-name { font-size:0.875rem; font-weight:800; letter-spacing:-0.01em; }
  .c2-lines { display:flex; flex-direction:column; gap:6px; }
  .c2-ln { display:grid; grid-template-columns:18px 1fr; gap:8px; align-items:center; }
  .c2-ln svg { width:18px; height:18px; flex:none; }
  .c2-word { font-size:0.625rem; font-weight:800; letter-spacing:0.04em; text-transform:uppercase; }
  .c2-field { display:flex; align-items:baseline; gap:7px; min-width:0; }
  .c2-lab { font-size:0.625rem; font-weight:800; letter-spacing:0.05em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
  .c2-val { font-size:0.875rem; font-weight:800; letter-spacing:-0.01em; color:var(--ink); overflow:hidden; text-overflow:ellipsis; }
  .c2-ln.c2-ok   .c2-word { color:var(--ok); }
  .c2-ln.c2-warn .c2-word { color:var(--warn); } .c2-ln.c2-warn .c2-val { color:var(--warn); font-size:0.75rem; }
  .c2-ln.c2-miss .c2-word { color:var(--miss); } .c2-ln.c2-miss .c2-val { color:var(--miss); font-size:0.75rem; }
  /* Concept 2 Submission row renders like any other row — no blue highlight. */

  /* ======================================================================== */
  /* CONCEPT 3 — TRACKED LEDGER  (prefix c3-)                                  */
  /* Full-width aligned ledger: every field is a full-panel row so columns     */
  /* line up across the WHOLE panel. Status rail anchors the left edge; zebra  */
  /* + status tint carry the eye horizontally; value column sits at a fixed x. */
  /* ======================================================================== */
  .c3-body { padding:2px 0 6px; }
  .c3-group + .c3-group { margin-top:2px; }
  .c3-grouphead { display:flex; align-items:baseline; flex-wrap:wrap; gap:8px;
                  padding:11px 16px 6px; }
  .c3-glob { font-size:0.8125rem; font-weight:800; letter-spacing:0.02em; text-transform:uppercase; color:var(--brand-dark); }
  .c3-group.c3-identity .c3-glob { color:var(--brand); }

  /* the tracking row: [rail][status word][LABEL][value] — all aligned */
  .c3-frow { display:grid; grid-template-columns:4px 30px 1fr minmax(90px,1.15fr);
             align-items:center; column-gap:12px; padding:0; min-height:38px;
             border-top:1px solid #edf0f4; position:relative; }
  .c3-rail { align-self:stretch; width:4px; border-radius:0; }
  .c3-word { display:inline-flex; align-items:center; gap:5px; padding-left:8px;
             font-size:0.625rem; font-weight:800; letter-spacing:0.04em; text-transform:uppercase; }
  .c3-word svg { width:15px; height:15px; flex:none; }
  .c3-lab { font-size:0.6875rem; font-weight:800; letter-spacing:0.045em; text-transform:uppercase;
            color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .c3-val { font-size:0.875rem; font-weight:800; letter-spacing:-0.01em; color:var(--ink);
            padding-right:16px; font-variant-numeric:tabular-nums;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .c3-val .c3-cur { color:var(--muted); font-weight:700; margin-right:1px; }

  /* status tints (base) + zebra (even row deepens the same hue) */
  .c3-frow.c3-ok   { background:#f1faf3; } .c3-frow.c3-ok.c3-even   { background:#e7f6ec; }
  .c3-frow.c3-warn { background:#fff6e9; } .c3-frow.c3-warn.c3-even { background:#ffefd6; }
  .c3-frow.c3-miss { background:#fdf2f1; } .c3-frow.c3-miss.c3-even { background:#fbe4e2; }
  .c3-frow.c3-ok   .c3-rail { background:var(--ok-bd); }  .c3-frow.c3-ok   .c3-word { color:var(--ok); }
  .c3-frow.c3-warn .c3-rail { background:var(--warn-bd); } .c3-frow.c3-warn .c3-word { color:var(--warn); }
  .c3-frow.c3-warn .c3-val { color:var(--warn); font-size:0.75rem; }
  .c3-frow.c3-miss .c3-rail { background:var(--miss-bd); } .c3-frow.c3-miss .c3-word { color:var(--miss); }
  .c3-frow.c3-miss .c3-val { color:var(--miss); font-size:0.75rem; }

  /* ---- footer note -------------------------------------------------------- */
  .foot { max-width:1560px; margin:0 auto; padding:0 1.5rem 3rem; font-size:0.75rem; color:var(--muted); }

  @media (max-width:520px) {
    header.hero { padding:2rem 1.15rem 1.75rem; }
    .controls, .compare { padding-left:1.15rem; padding-right:1.15rem; }
  }
</style>
</head>
<body>
  <div class="breadcrumb">
    <span class="home">Astrus</span><span class="sep">&rsaquo;</span>
    <span>Submission Summary</span><span class="sep">&rsaquo;</span>
    <span>Concept Comparison</span>
  </div>

  <header class="hero">
    <div class="hero-inner">
      <h1>Astrus Submission Summary &mdash; Concept Comparison</h1>
    </div>
  </header>

  <div class="controls">
    <div class="legend" role="note" aria-label="Status legend">
      <span class="lg"><svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="9" fill="var(--ok)"/><path d="M6 10.2l2.6 2.6L14.2 7.2" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>OK / Present</span>
      <span class="lg"><svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 2l8.5 15H1.5z" fill="var(--warn)"/><rect x="9.1" y="7.4" width="1.8" height="5" rx="0.9" fill="#fff"/><circle cx="10" cy="14.4" r="1" fill="#fff"/></svg>Partial</span>
      <span class="lg"><svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="9" fill="var(--miss)"/><path d="M7 7l6 6M13 7l-6 6" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg>Missing</span>
    </div>
  </div>

  <main class="compare">
    <!-- CONCEPT 1 · Bold Boxes -->
    <section class="panel concept--1" aria-label="Concept 1 — Bold Boxes">
      <div class="panel-head"><span class="pn">Concept 1</span><span class="pmeta"><b>#2093</b> &middot; Bold Boxes</span></div>
      <div class="panel-body">
        <div class="p-head">
          <div class="p-eyebrow" id="c1-eyebrow"></div>
          <h2 class="p-applicant" id="c1-applicant"></h2>
          <div class="p-subline" id="c1-subline"></div>
        </div>
        <div class="c1-rows" id="c1-rows"></div>
      </div>
    </section>

    <!-- CONCEPT 2 · Lead Status -->
    <section class="panel concept--2" aria-label="Concept 2 — Lead Status">
      <div class="panel-head"><span class="pn">Concept 2</span><span class="pmeta"><b>#7641</b> &middot; Lead Status</span></div>
      <div class="panel-body">
        <div class="p-head">
          <div class="p-eyebrow" id="c2-eyebrow"></div>
          <h2 class="p-applicant" id="c2-applicant"></h2>
          <div class="p-subline" id="c2-subline"></div>
        </div>
        <div class="c2-rows" id="c2-rows"></div>
      </div>
    </section>

    <!-- CONCEPT 3 · Tracked Ledger -->
    <section class="panel concept--3" aria-label="Concept 3 — Tracked Ledger">
      <div class="panel-head"><span class="pn">Concept 3</span><span class="pmeta"><b>#5150</b> &middot; Tracked Ledger</span></div>
      <div class="panel-body">
        <div class="p-head">
          <div class="p-eyebrow" id="c3-eyebrow"></div>
          <h2 class="p-applicant" id="c3-applicant"></h2>
          <div class="p-subline" id="c3-subline"></div>
        </div>
        <div class="c3-body" id="c3-rows"></div>
      </div>
    </section>
  </main>

<script>
/* Shared data — copied verbatim from concepts/02-bold-boxes.html & 03-lead-status.html. */
const DATA = {
  ab: {
    header:{name:"A & B Painting, Inc.", sub:"SUB 022667", status:"Clearance Requested", tag:"New",
      meta:"3 named insureds · R2 Solutions · Chubb · Place · ESIS · CA + HI · Eff 07/01/2026"},
    lines:[
      {lob:"Workers’ Compensation", geo:["CA"], fields:[
        {label:"Payroll", value:"$4,928,350", status:"ok"},
        {label:"Class codes", value:"Present", status:"ok"},
        {label:"Experience mod", value:"Present", status:"ok"},
        {label:"Loss runs", value:"$7.9M incurred", status:"ok"}]},
      {lob:"General Liability", geo:["CA"], fields:[
        {label:"Revenue", value:"$8,500,000", status:"ok"},
        {label:"Loss runs", value:"$212K incurred", status:"ok"}]},
      {lob:"Commercial Auto", geo:["CA"], fields:[
        {label:"Vehicle schedule", value:"31 units", status:"ok"},
        {label:"Garaging", value:"CA", status:"ok"},
        {label:"Loss runs", value:"$606K incurred", status:"ok"}]},
      {lob:"Commercial Auto", geo:["HI"], carve:"carve-out", fields:[
        {label:"Vehicle schedule", value:"2 units", status:"ok"},
        {label:"Loss runs", value:"Present", status:"ok"}]},
      {lob:"Excess Liability", geo:["CA","HI"], fields:[
        {label:"Underlying limits", value:"Present", status:"ok"},
        {label:"Effective date", value:"Missing", status:"warn"},
        {label:"Loss runs", value:"$0 incurred", status:"ok"}]},
      {lob:"Submission", kind:"identity", fields:[
        {label:"Revenue", value:"$8,500,000", status:"ok"},
        {label:"NAICS", value:"238320", status:"ok"},
        {label:"SIC", value:"1721", status:"ok"},
        {label:"Effective date", value:"07/01/2026", status:"ok"},
        {label:"FEIN", value:"Present", status:"ok"}]}
    ]},
  jhl: {
    header:{name:"J.H. Lynch & Sons, Inc.", sub:"", status:"", tag:"",
      meta:"Rhode Island · heavy highway construction & trucking · large fleet · R2 Solutions"},
    lines:[
      {lob:"Workers’ Compensation", geo:["RI"], fields:[
        {label:"Payroll", value:"$17,770,000", status:"ok"},
        {label:"Loss runs", value:"$29.0M · 821 claims", status:"ok"}]},
      {lob:"General Liability", geo:["RI"], fields:[
        {label:"Revenue", value:"$75,000,000", status:"ok"},
        {label:"Loss runs", value:"$12.9M · 1,739 claims", status:"ok"}]},
      {lob:"Commercial Auto", geo:["RI"], fields:[
        {label:"Vehicle schedule", value:"249 units", status:"ok"},
        {label:"Loss runs", value:"$40.0M · 3,797 claims", status:"ok"}]},
      {lob:"Submission", kind:"identity", fields:[
        {label:"Revenue", value:"$75,000,000", status:"ok"},
        {label:"NAICS", value:"Present", status:"ok"},
        {label:"SIC", value:"Present", status:"ok"},
        {label:"Effective date", value:"Present", status:"ok"},
        {label:"FEIN", value:"Present", status:"ok"}]}
    ]}
};

/* Status icons — copied verbatim (class attr dropped; sized via parent svg selectors). */
const ICON = {
  ok:'<svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="9" fill="var(--ok)"/><path d="M6 10.2l2.6 2.6L14.2 7.2" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  warn:'<svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 2l8.5 15H1.5z" fill="var(--warn)"/><rect x="9.1" y="7.4" width="1.8" height="5" rx="0.9" fill="#fff"/><circle cx="10" cy="14.4" r="1" fill="#fff"/></svg>',
  miss:'<svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="9" fill="var(--miss)"/><path d="M7 7l6 6M13 7l-6 6" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/></svg>'
};
const WORD = { ok:"OK", warn:"Partial", miss:"Missing" };

function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
/* wrap a leading $ in a smaller muted span (Bold Boxes / Tracked Ledger) */
function curHtml(v, cls){
  const m = String(v).match(/^\$(.+)$/);
  if (m) return '<span class="'+cls+'">$</span>' + esc(m[1]);
  return esc(v);
}

/* shared header renderer for a panel's applicant block */
function renderHead(prefix, d){
  const h = d.header, eb = [];
  if (h.sub)    eb.push('<span class="sub">'+esc(h.sub).replace(/ /g,'&nbsp;')+'</span>');
  if (h.status) eb.push('<span class="pill">'+esc(h.status)+'</span>');
  if (h.tag)    eb.push('<span>'+esc(h.tag)+'</span>');
  document.getElementById(prefix+'-eyebrow').innerHTML = eb.join('<span class="d"></span>');
  document.getElementById(prefix+'-applicant').textContent = h.name;
  document.getElementById(prefix+'-subline').textContent = h.meta || '';
}

/* Submission (identity) row leads; LOB lines follow underneath. */
function ordered(d){
  const id = d.lines.filter(l => l.kind === 'identity');
  const rest = d.lines.filter(l => l.kind !== 'identity');
  return id.concat(rest);
}

/* ---- Concept 1 · Bold Boxes ------------------------------------------------ */
function render1(d){
  renderHead('c1', d);
  document.getElementById('c1-rows').innerHTML = ordered(d).map(line => {
    const isId = line.kind === 'identity';
    let tags = '';
    (line.geo||[]).forEach(g => tags += '<span class="geotag">'+esc(g)+'</span>');
    if (line.carve) tags += '<span class="kindtag">'+esc(line.carve)+'</span>';
    const fields = line.fields.map(f =>
      '<span class="c1-fc c1-'+f.status+'">'+ICON[f.status]+
      '<span class="c1-txt"><span class="c1-lab">'+esc(f.label)+'</span>'+
      '<span class="c1-val">'+curHtml(f.value,'c1-cur')+'</span></span></span>').join('');
    return '<div class="c1-row'+(isId?' c1-identity':'')+'">'+
      '<div class="c1-row-id"><span class="c1-row-name">'+esc(line.lob)+'</span>'+tags+'</div>'+
      '<div class="c1-fields">'+fields+'</div></div>';
  }).join('');
}

/* ---- Concept 2 · Lead Status ---------------------------------------------- */
function render2(d){
  renderHead('c2', d);
  document.getElementById('c2-rows').innerHTML = ordered(d).map(line => {
    const isId = line.kind === 'identity';
    const tags = [];
    (line.geo||[]).forEach(g => tags.push('<span class="geotag">'+esc(g)+'</span>'));
    if (line.carve) tags.push('<span class="kindtag">'+esc(line.carve)+'</span>');
    if (isId)       tags.push('<span class="kindtag">applicant</span>');
    const lns = line.fields.map(f => {
      const st = f.status || 'ok';
      return '<div class="c2-ln c2-'+st+'">'+ICON[st]+
        '<span class="c2-field"><span class="c2-lab">'+esc(f.label)+'</span>'+
        '<span class="c2-val">'+esc(f.value)+'</span></span></div>';
    }).join('');
    return '<div class="c2-row'+(isId?' c2-identity':'')+'">'+
      '<div class="c2-row-head"><span class="c2-row-name">'+esc(line.lob)+'</span>'+tags.join('')+'</div>'+
      '<div class="c2-lines">'+lns+'</div></div>';
  }).join('');
}

/* ---- Concept 3 · Tracked Ledger ------------------------------------------- */
function render3(d){
  renderHead('c3', d);
  document.getElementById('c3-rows').innerHTML = ordered(d).map(line => {
    const isId = line.kind === 'identity';
    const tags = [];
    (line.geo||[]).forEach(g => tags.push('<span class="geotag">'+esc(g)+'</span>'));
    if (line.carve) tags.push('<span class="kindtag">'+esc(line.carve)+'</span>');
    if (isId)       tags.push('<span class="kindtag">applicant</span>');
    const frows = line.fields.map((f,i) => {
      const st = f.status || 'ok';
      return '<div class="c3-frow c3-'+st+(i%2?' c3-even':'')+'">'+
        '<span class="c3-rail"></span>'+
        '<span class="c3-word">'+ICON[st]+'</span>'+
        '<span class="c3-lab">'+esc(f.label)+'</span>'+
        '<span class="c3-val">'+curHtml(f.value,'c3-cur')+'</span></div>';
    }).join('');
    return '<div class="c3-group'+(isId?' c3-identity':'')+'">'+
      '<div class="c3-grouphead"><span class="c3-glob">'+esc(line.lob)+'</span>'+tags.join('')+'</div>'+
      frows+'</div>';
  }).join('');
}

function renderAll(key){
  const d = DATA[key];
  render1(d); render2(d); render3(d);
}

renderAll('ab');
</script>
